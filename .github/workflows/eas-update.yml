name: EAS Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      message:
        description: Update message
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    name: EAS Update (${{ github.event.inputs.channel }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # 8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        working-directory: apps/parakeet
        run: |
          eas update \
            --channel ${{ github.event.inputs.channel }} \
            --platform android \
            --environment ${{ github.event.inputs.channel }} \
            --message "${{ github.event.inputs.message || github.event.head_commit.message }}" \
            --non-interactive
