name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Nx cache
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ hashFiles('**/package-lock.json') }}-

      - name: Check boundaries
        run: npm run check:boundaries

      - name: Build shared-types declarations (for project reference consumers)
        run: npx tsc -p packages/shared-types/tsconfig.lib.json

      - name: Typecheck (affected)
        run: npx nx affected --target=typecheck --base=origin/main --head=HEAD --exclude=training-sim,dashboard

      - name: Lint (affected)
        run: npx nx affected --target=lint --base=origin/main --head=HEAD

      - name: Test (affected)
        run: npx nx affected --target=test --base=origin/main --head=HEAD

